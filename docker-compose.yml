services:
  sse:
    build: ./src/test/resources/sse/.
    container_name: SSE_endpoint_plain_text
    command: gunicorn --chdir /sse --bind 0.0.0.0:8000 -w 4 films_sse_flask:app
    ports:
      - "8001:8000"
    volumes:
      - ./src/test/resources/sse:/sse
  sse_json:
    build: ./src/test/resources/sse/.
    container_name: SSE_endpoint_json
    command: gunicorn --chdir /sse --bind 0.0.0.0:8000 -w 4 films_sse_json_flask:app
    ports:
      - "8002:8000"
    volumes:
      - ./src/test/resources/sse:/sse
  sse_xml:
    build: ./src/test/resources/sse/.
    container_name: SSE_endpoint_xml
    command: gunicorn --chdir /sse --bind 0.0.0.0:8000 -w 4 films_sse_xml_flask:app
    ports:
      - "8003:8000"
    volumes:
      - ./src/test/resources/sse:/sse
  sse_csv:
    build: ./src/test/resources/sse/.
    container_name: SSE_endpoint_csv
    command: gunicorn --chdir /sse --bind 0.0.0.0:8000 -w 4 films_sse_csv_flask:app
    ports:
      - "8007:8000"
    volumes:
      - ./src/test/resources/sse:/sse
  websocket_json:
    image: node:24
    container_name: Websocket_endpoint_json
    command: bash -c "npm install && node films_websocket_json.js"
    ports:
      - "8004:8765"
    volumes:
      - ./src/test/resources/websocket:/websocket
    working_dir: /websocket
  websocket_xml:
    image: node:24
    container_name: Websocket_endpoint_xml
    command: bash -c "npm install && node films_websocket_xml.js"
    ports:
      - "8005:8765"
    volumes:
      - ./src/test/resources/websocket:/websocket
    working_dir: /websocket
  websocket_csv:
    image: node:24
    container_name: Websocket_endpoint_csv
    command: bash -c "npm install && node films_websocket_csv.js"
    ports:
      - "8006:8765"
    volumes:
      - ./src/test/resources/websocket:/websocket
    working_dir: /websocket
  kafka_server:
    image: apache/kafka:4.1.0
    container_name: Kafka_server
    ports:
      - "9092:9092"
